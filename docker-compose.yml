services:
  vetclinic:
    image: postgres:16
    container_name: vetclinic-db
    environment:
      POSTGRES_DB: vetclinic
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - vetclinic_data:/var/lib/postgresql/data

volumes:
  vetclinic_data: